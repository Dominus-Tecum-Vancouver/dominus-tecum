<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recursos — Dominus Tecum</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --cream: #F2E8D5;
            --parchment: #FAF5EC;
            --parchment-dark: #EDE3CF;
            --tan: #A08B72;
            --tan-light: #C4AA8A;
            --steel: #5B8A9A;
            --steel-light: #7AAABB;
            --steel-pale: #D6E8EE;
            --steel-bg: #EBF4F7;
            --burgundy: #7A1528;
            --burgundy-light: #9A2A3A;
            --dark: #2A1810;
            --muted: #6A7E85;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--parchment);
            color: var(--dark);
            min-height: 100vh
        }

        /* ── NAV ── */
        nav {
            background: var(--steel);
            padding: 0 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none
        }

        .nav-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.3)
        }

        .nav-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            letter-spacing: .2em;
            color: var(--cream);
            font-weight: 600
        }

        .nav-sub {
            font-size: 9px;
            letter-spacing: .15em;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase
        }

        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none
        }

        .nav-links a {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: .18em;
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            transition: color .2s
        }

        .nav-links a:hover {
            color: white
        }

        .lang-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.75);
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: .15em;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            transition: all .2s
        }

        .lang-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: white
        }

        /* ── HERO ── */
        .page-hero {
            background: var(--steel);
            padding: 64px 48px 56px;
            text-align: center
        }

        .page-hero .label {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: .25em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px
        }

        .page-hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--cream);
            letter-spacing: .05em;
            margin-bottom: 12px
        }

        .page-hero p {
            font-family: 'Crimson Text', serif;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic
        }

        /* ── CONTENT ── */
        .content {
            max-width: 900px;
            margin: 0 auto;
            padding: 56px 24px
        }

        /* ── CATEGORY SECTION ── */
        .category-section {
            margin-bottom: 48px
        }

        .category-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            letter-spacing: .25em;
            color: var(--steel);
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--steel-pale);
            text-transform: uppercase
        }

        /* ── RESOURCE CARD ── */
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px
        }

        .resource-card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            border: 1px solid var(--parchment-dark);
            transition: all .2s;
            text-decoration: none;
            display: block;
            color: var(--dark)
        }

        .resource-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(42, 24, 16, .08);
            border-color: var(--steel-pale)
        }

        .resource-card.has-url {
            cursor: pointer
        }

        .resource-card .r-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            letter-spacing: .08em;
            color: var(--dark);
            margin-bottom: 8px;
            line-height: 1.4
        }

        .resource-card .r-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 16px
        }

        .resource-card .r-link {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: .15em;
            color: var(--steel);
            display: inline-flex;
            align-items: center;
            gap: 6px
        }

        .resource-card .r-link svg {
            transition: transform .2s
        }

        .resource-card:hover .r-link svg {
            transform: translateX(3px)
        }

        /* ── EMPTY STATE ── */
        .empty {
            text-align: center;
            padding: 80px 24px;
            color: var(--muted)
        }

        .empty p {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            letter-spacing: .15em
        }

        /* ── FOOTER ── */
        footer {
            background: var(--parchment-dark);
            padding: 40px 48px 24px;
            margin-top: 80px
        }

        .footer-copy {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: .2em;
            color: var(--tan);
            padding-top: 24px;
            border-top: 1px solid var(--tan-light)
        }

        @media(max-width:768px) {
            nav {
                padding: 0 20px
            }

            .nav-links {
                display: none
            }

            .page-hero {
                padding: 48px 24px 40px
            }

            .page-hero h1 {
                font-size: 26px
            }

            .content {
                padding: 40px 16px
            }

            footer {
                padding: 32px 24px 20px
            }
        }
    </style>
</head>

    </footer>

    <script>
        const API_BASE = 'https://dominus-tecum.onrender.com';
        let currentLang = 'es';

        const CATEGORY_LABELS = {
            es: { oracion: 'ORACIÓN', lecturas: 'LECTURAS', videos: 'VIDEOS', otro: 'OTROS RECURSOS' },
            en: { oracion: 'PRAYER', lecturas: 'READINGS', videos: 'VIDEOS', otro: 'OTHER RESOURCES' }
        };

        const LINK_LABELS = {
            es: 'VER RECURSO',
            en: 'VIEW RESOURCE'
        };

        async function loadRecursos(lang) {
            const container = document.getElementById('recursos-container');
            try {
                const res = await fetch(`${API_BASE}/api/recursos?lang=${lang}`);
                const data = await res.json();

                if (!data.length) {
                    container.innerHTML = `<div class="empty"><p>${lang === 'es' ? 'AÚN NO HAY RECURSOS DISPONIBLES.' : 'NO RESOURCES AVAILABLE YET.'}</p></div>`;
                    return;
                }

                // Group by category
                const grouped = {};
                data.forEach(r => {
                    if (!grouped[r.category]) grouped[r.category] = [];
                    grouped[r.category].push(r);
                });

                const categoryOrder = ['oracion', 'lecturas', 'videos', 'otro'];
                let html = '';

                categoryOrder.forEach(cat => {
                    if (!grouped[cat]) return;
                    const label = CATEGORY_LABELS[lang][cat] || cat.toUpperCase();
                    html += `<div class="category-section">
        <div class="category-label">${label}</div>
        <div class="resource-grid">`;

                    grouped[cat].forEach(r => {
                        const isLink = r.url && r.url.trim() !== '';
                        const tag = isLink ? 'a' : 'div';
                        const href = isLink ? `href="${r.url}" target="_blank" rel="noopener"` : '';
                        html += `<${tag} class="resource-card${isLink ? ' has-url' : ''}" ${href}>
          <div class="r-title">${r.title}</div>
          <div class="r-desc">${r.desc}</div>
          ${isLink ? `<div class="r-link">${LINK_LABELS[lang]} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>` : ''}
        </${tag}>`;
                    });

                    html += '</div></div>';
                });

                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="empty"><p>Error cargando recursos.</p></div>';
            }
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-es]').forEach(el => {
                el.textContent = lang === 'es' ? el.dataset.es : el.dataset.en;
            });
            document.getElementById('btn-es').classList.toggle('active', lang === 'es');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.documentElement.lang = lang;
            loadRecursos(lang);
        }

        loadRecursos('es');
    </script>
