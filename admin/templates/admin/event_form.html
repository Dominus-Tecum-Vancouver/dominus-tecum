{% extends 'admin/base.html' %}
{% block content %}

<div class="page-title">{{ 'Editar evento' if event else 'Nuevo evento' }}</div>
<div class="page-sub">{{ 'Modifica los detalles del evento.' if event else 'Completa los campos en español e inglés.' }}</div>

<div class="card" style="max-width:700px">
  <form method="POST">

    <div class="form-row">
      <div class="form-group">
        <label>TÍTULO (ESPAÑOL)</label>
        <input type="text" name="title_es" value="{{ event.title_es if event }}" required placeholder="Noche de Convivencia"/>
      </div>
      <div class="form-group">
        <label>TITLE (ENGLISH)</label>
        <input type="text" name="title_en" value="{{ event.title_en if event }}" required placeholder="Social Night"/>
      </div>
    </div>

    <div class="form-group">
      <label>DESCRIPCIÓN (ESPAÑOL)</label>
      <textarea name="desc_es" rows="3" required placeholder="Una noche relajada para conocernos mejor...">{{ event.desc_es if event }}</textarea>
    </div>

    <div class="form-group">
      <label>DESCRIPTION (ENGLISH)</label>
      <textarea name="desc_en" rows="3" required placeholder="A relaxed evening to get to know each other...">{{ event.desc_en if event }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>FECHA / DATE</label>
        <input type="date" name="date" value="{{ event.date.strftime('%Y-%m-%d') if event }}" required/>
      </div>
      <div class="form-group">
        <label>HORA / TIME</label>
        <input type="text" name="time" value="{{ event.time if event }}" required placeholder="7:00 PM"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>TIPO / TAG</label>
        <select name="tag" required>
          <option value="social"  {{ 'selected' if event and event.tag == 'social' }}>Social</option>
          <option value="faith"   {{ 'selected' if event and event.tag == 'faith' }}>Fe / Faith</option>
          <option value="service" {{ 'selected' if event and event.tag == 'service' }}>Servicio / Service</option>
        </select>
      </div>
      {% if event %}
      <div class="form-group">
        <label>ESTADO / STATUS</label>
        <select name="active">
          <option value="active" {{ 'selected' if event.active }}>Activo / Active</option>
          <option value=""       {{ 'selected' if not event.active }}>Inactivo / Inactive</option>
        </select>
      </div>
      {% endif %}
    </div>

    <div style="display:flex;gap:12px;margin-top:8px">
      <button type="submit" class="btn btn-primary">
        {{ 'Guardar cambios' if event else 'Crear evento' }}
      </button>
      <a href="/admin" class="btn btn-outline">Cancelar</a>
    </div>

  </form>
</div>

{% endblock %}
